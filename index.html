<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Saarthi 2.0 — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SAARTHI 2.0 — design system v2
   "Warm porcelain × midnight indigo" · editorial-premium
   Full class contract preserved from v1 (182 selectors)
   ============================================================ */
:root{
  --indigo:#2C3C8E; --indigo-d:#1A2559; --indigo-l:#5A6EC2; --indigo-50:#EEF1FC; --indigo-100:#DEE4F9;
  --saffron:#E8821F; --saffron-d:#A85A0C; --saffron-50:#FDF1E1;
  --teal:#0F8A62; --teal-d:#0A5E44; --teal-50:#E4F5ED;
  --red:#C13F31; --red-50:#FBEAE7;
  --ink:#1A1C26; --muted:#575D6E; --faint:#8B90A0;
  --line:#E8E6E0; --line2:#D6D3CA;
  --surface:#F3F1EA; --paper:#FFFFFF; --canvas:#F7F6F1;
  --sans:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --r-sm:11px; --r:16px; --r-lg:22px; --r-xl:28px;
  --sh-1:0 1px 2px rgba(26,29,45,.05), 0 2px 6px rgba(26,29,45,.04);
  --sh-2:0 2px 6px rgba(26,29,45,.05), 0 14px 34px -12px rgba(26,29,45,.16);
  --sh-3:0 24px 64px -12px rgba(18,22,44,.30), 0 8px 20px rgba(18,22,44,.12);
  --dur:.34s; --ease:cubic-bezier(.22,.9,.32,1); --spring:cubic-bezier(.32,1.36,.4,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
::selection{background:var(--indigo-100)}
:focus-visible{outline:2.5px solid var(--indigo-l); outline-offset:2px; border-radius:6px}
body{
  font-family:var(--sans); color:var(--ink);
  background:
    radial-gradient(1100px 720px at 14% -12%, #ECEEFA 0%, rgba(236,238,250,0) 58%),
    radial-gradient(900px 640px at 108% 4%, #F8ECDB 0%, rgba(248,236,219,0) 55%),
    linear-gradient(180deg,#F2F0EA 0%, #EAE8E0 100%);
  min-height:100vh;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  display:flex; align-items:center; justify-content:center; padding:26px 16px;
}
@media (max-width:460px){ body{padding:0} }

/* ---------- phone shell ---------- */
#device{
  position:relative; width:390px; height:844px; max-height:calc(100vh - 36px);
  background:var(--canvas); border-radius:46px; overflow:hidden;
  box-shadow:var(--sh-3), 0 0 0 11px #0E1119, 0 0 0 13px #272D3D, 0 44px 90px -20px rgba(16,20,40,.45);
}
@media (max-width:460px){
  #device{width:100vw; height:100vh; max-height:100vh; border-radius:0; box-shadow:none}
}
#notch{position:absolute; top:0; left:50%; transform:translateX(-50%); width:146px; height:29px; background:#0E1119; border-radius:0 0 18px 18px; z-index:60}
@media (max-width:460px){ #notch{display:none} }
#statusbar{position:absolute; top:0; left:0; right:0; height:46px; display:flex; align-items:center; justify-content:space-between; padding:14px 26px 0; font-size:13px; font-weight:800; color:var(--ink); z-index:55; pointer-events:none; letter-spacing:.01em}
#statusbar .sb-right{display:flex; gap:6px; align-items:center}
#statusbar svg{width:16px;height:16px}
@media (max-width:460px){ #statusbar{padding-top:max(14px,env(safe-area-inset-top))} }
#device.dark-status #statusbar{color:#fff}

#viewport{position:absolute; inset:0; display:flex; flex-direction:column}
#screen{position:relative; flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding-top:46px}
#screen::-webkit-scrollbar{width:0}
.has-nav #screen{padding-bottom:100px}
.has-appbar #screen{padding-top:0}

/* ---------- app bar ---------- */
#appbar{position:relative; z-index:40; display:none; align-items:center; gap:12px; padding:56px 18px 12px; background:var(--canvas)}
.has-appbar #appbar{display:flex}
#appbar.flush{background:transparent}
#appbar .ab-back{flex:none; width:40px; height:40px; border-radius:50%; border:1px solid var(--line); background:var(--paper); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--sh-1); transition:background var(--dur) var(--ease), transform .14s var(--spring)}
#appbar .ab-back:hover{background:var(--surface)} #appbar .ab-back:active{transform:scale(.9)}
#appbar .ab-back svg{width:19px;height:19px;color:var(--indigo-d)}
#appbar .ab-title{font-family:var(--serif); font-weight:600; font-size:19px; letter-spacing:-.01em; color:var(--ink)}
#appbar .ab-sub{font-size:12px; color:var(--faint); font-weight:600; margin-top:1px; font-family:var(--sans)}
#appbar .ab-right{margin-left:auto; display:flex; gap:8px}

/* ---------- bottom nav : floating dock ---------- */
#navbar{position:absolute; left:12px; right:12px; bottom:calc(10px + env(safe-area-inset-bottom)); height:66px; display:none; z-index:45;
  background:rgba(255,255,255,.94); backdrop-filter:saturate(1.5) blur(18px); border:1px solid rgba(26,29,45,.07);
  border-radius:26px; box-shadow:0 10px 32px -8px rgba(20,26,55,.24), 0 2px 8px rgba(20,26,55,.07);
  padding:6px; gap:2px}
.has-nav #navbar{display:flex}
#dock{position:absolute; left:12px; right:12px; bottom:calc(86px + env(safe-area-inset-bottom)); z-index:44; display:none}
#dock.show{display:block; animation:dockIn .42s var(--spring) both}
@keyframes dockIn{from{opacity:0; transform:translateY(16px)}to{opacity:1; transform:translateY(0)}}
.has-dock #screen{padding-bottom:192px}
/* ---- Saarthi Ticket ---- */
.tkt{display:block;width:100%;text-align:left;padding:0;border:0;background:none;cursor:default;-webkit-tap-highlight-color:transparent}
button.tkt{cursor:pointer;transition:transform .18s var(--ease)}
button.tkt:active{transform:scale(.985)}
.tkt-card{position:relative;overflow:hidden;background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--sh-2)}
.tk-stamp{position:absolute; z-index:6; right:12px; top:58px; transform:rotate(-8deg); border:2.5px solid currentColor; border-radius:10px; padding:6px 13px 5px; text-align:center; pointer-events:none; background:rgba(255,255,255,.78); backdrop-filter:blur(1.5px); box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.6), 0 2px 8px -2px rgba(28,34,72,.25); animation:stampIn .55s var(--spring) .35s both}
.tk-stamp .w{font-family:var(--serif); font-weight:700; font-size:19px; letter-spacing:.2em; text-transform:uppercase; line-height:1}
.tk-stamp .t{font-size:8.5px; font-weight:800; letter-spacing:.32em; margin-top:3px; opacity:.85}
@keyframes stampIn{0%{opacity:0; transform:rotate(-8deg) scale(1.9)}70%{opacity:1; transform:rotate(-8deg) scale(.94)}100%{opacity:1; transform:rotate(-8deg) scale(1)}}
/* traveller shutter */
.shutter{width:66px;height:66px;border-radius:50%;background:#fff;border:4px solid var(--indigo);box-shadow:var(--sh-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s var(--spring)}
.shutter:active{transform:scale(.9)}
.shutter .core{width:44px;height:44px;border-radius:50%;background:linear-gradient(160deg,#3A4CAE,var(--indigo-d))}
.revrows>:last-child{border-bottom:0 !important}
#navbar .nav-i{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--faint); font-size:10.5px; font-weight:700; border:0; background:none; padding:6px 2px; border-radius:19px; transition:color var(--dur) var(--ease), background var(--dur) var(--ease), transform .14s var(--spring)}
#navbar .nav-i svg{width:22px;height:22px; transition:transform var(--dur) var(--spring)}
#navbar .nav-i:hover{color:var(--muted)}
#navbar .nav-i:active{transform:scale(.93)}
#navbar .nav-i.on{color:var(--indigo); background:var(--indigo-50)}
#navbar .nav-i.on svg{transform:translateY(-1px)}

/* ============================================================
   primitives
   ============================================================ */
.wrap{padding:8px 20px 30px}
.btn{font-family:var(--sans); font-weight:800; font-size:15px; border:0; border-radius:999px; padding:14px 20px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:9px; transition:transform .14s var(--spring), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease), opacity var(--dur), filter var(--dur); line-height:1.15; letter-spacing:-.01em}
.btn svg{width:18px;height:18px}
.ic{width:18px;height:18px;flex:none}
.ic-box{display:flex;align-items:center;justify-content:center}
.ic-uc{width:26px;height:26px}
.ic-box svg{width:55%;height:55%}
.ic-hero{width:38px;height:38px}
.star-big{width:30px;height:30px}
.btn:active{transform:scale(.965)}
.btn[disabled]{opacity:.42; cursor:not-allowed; transform:none; filter:saturate(.6)}
.btn-primary{background:linear-gradient(180deg,#3A4CAE 0%, var(--indigo) 52%, #263481 100%); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.20), 0 10px 24px -6px rgba(44,60,142,.45)}
.btn-primary:hover:not([disabled]){filter:brightness(1.06); box-shadow:inset 0 1px 0 rgba(255,255,255,.20), 0 12px 30px -6px rgba(44,60,142,.52)}
.btn-accent{background:linear-gradient(180deg,#F09330 0%, var(--saffron) 55%, #D06F10 100%); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.26), 0 10px 24px -6px rgba(232,130,31,.45)}
.btn-accent:hover:not([disabled]){filter:brightness(1.05)}
.btn-teal{background:linear-gradient(180deg,#149C70 0%, var(--teal) 55%, #0A6E4E 100%); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 10px 24px -6px rgba(15,138,98,.40)}
.btn-teal:hover:not([disabled]){filter:brightness(1.05)}
.btn-ghost{background:var(--paper); color:var(--indigo-d); border:1px solid var(--line); box-shadow:var(--sh-1)}
.btn-ghost:hover{background:var(--surface)}
.btn-soft{background:var(--indigo-50); color:var(--indigo-d)}
.btn-soft:hover{background:var(--indigo-100)}
.btn-link{background:none; color:var(--indigo); font-weight:800; padding:10px}
.btn-block{display:flex; width:100%}
.btn-lg{padding:17px 22px; font-size:16px}
.btn-danger{background:linear-gradient(180deg,#D14B3C,#B23227); color:#fff; box-shadow:0 8px 20px -6px rgba(193,63,49,.4)}

.h1{font-family:var(--serif); font-weight:600; font-size:30px; line-height:1.1; letter-spacing:-.015em; color:var(--ink)}
.h2{font-family:var(--serif); font-weight:600; font-size:21px; letter-spacing:-.01em}
.lede{color:var(--muted); font-size:14.5px; line-height:1.55; font-weight:500}
.eyebrow{font-size:11px; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:#7079AB}
.muted{color:var(--muted)} .faint{color:var(--faint)} .tiny{font-size:12px}

.card{background:var(--paper); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--sh-1)}
.card-pad{padding:18px}
.hscroll::-webkit-scrollbar{display:none}
.hscroll{scrollbar-width:none;-ms-overflow-style:none}
.tcard{background:var(--paper); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--sh-1); padding:18px}
.tdot{width:7px; height:7px; border-radius:50%; background:var(--line2); transition:all .35s var(--ease)}
.tdot.on{width:22px; border-radius:4px; background:var(--indigo)}
.ucrow{display:flex; align-items:center; gap:14px; width:100%; text-align:left; background:var(--paper); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--sh-1); padding:16px; cursor:pointer; font-family:var(--sans); transition:border-color .2s, box-shadow .25s var(--ease), transform .16s var(--spring)}
.ucrow:hover{border-color:var(--line2); box-shadow:var(--sh-2); transform:translateY(-1px)}
.ucrow:active{transform:scale(.982)}
.ucrow.on{border-color:var(--indigo); box-shadow:0 0 0 3.5px rgba(44,60,142,.10)}
.ucrow-check{flex:none; color:var(--faint); display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:50%; background:var(--surface)}
.ucrow.on .ucrow-check{color:var(--teal-d); background:var(--teal-50)}
.sep{height:1px; background:var(--line); border:0; margin:0}

.field{margin-bottom:14px}
.field > label{display:block; font-size:12.5px; font-weight:700; color:var(--muted); margin:0 0 7px 3px; letter-spacing:.01em}
.control{display:flex; align-items:center; gap:10px; background:var(--surface); border:1.5px solid transparent; border-radius:var(--r); padding:14px 15px; transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease)}
.control:focus-within{background:var(--paper); border-color:var(--indigo-l); box-shadow:0 0 0 4px rgba(90,110,194,.15)}
.control svg{width:18px;height:18px;color:var(--faint); flex:none}
.control input{border:0; outline:0; font-family:var(--sans); font-size:15.5px; font-weight:600; color:var(--ink); width:100%; background:transparent}
.control input::placeholder{color:var(--faint); font-weight:500}
.control .pre{font-weight:700; color:var(--muted)}

.pill{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; padding:5.5px 11px; border-radius:999px; line-height:1; letter-spacing:.01em}
.pill svg{width:13px;height:13px}
.pill-teal{background:var(--teal-50); color:var(--teal-d)}
.pill-indigo{background:var(--indigo-50); color:var(--indigo)}
.pill-saffron{background:var(--saffron-50); color:var(--saffron-d)}
.pill-red{background:var(--red-50); color:var(--red)}
.pill-ghost{background:var(--paper); color:var(--muted); border:1px solid var(--line)}

.row{display:flex; align-items:center; gap:13px; padding:15px 16px; background:var(--paper); border:1px solid var(--line); border-radius:18px; cursor:pointer; box-shadow:var(--sh-1); transition:border-color var(--dur), box-shadow var(--dur) var(--ease), transform .15s var(--spring); width:100%; text-align:left; font-family:var(--sans)}
.row:hover{border-color:var(--line2); box-shadow:var(--sh-2)} .row:active{transform:scale(.985)}
.row .ic-box{flex:none; width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center}
.row .ic-box svg{width:22px;height:22px}
.row .r-body{flex:1; min-width:0}
.row .r-title{font-weight:700; font-size:15px; letter-spacing:-.01em}
.row .r-sub{font-size:12.5px; color:var(--faint); font-weight:500; margin-top:2px; line-height:1.4}
.row .r-trail{flex:none; color:var(--line2); display:flex; align-items:center; gap:8px}
.row .r-trail svg{width:20px;height:20px}

.ib-indigo{background:linear-gradient(150deg,#F0F3FE,#E2E8FA);color:var(--indigo)}
.ib-saffron{background:linear-gradient(150deg,#FEF3E3,#FBE6C8);color:var(--saffron-d)}
.ib-teal{background:linear-gradient(150deg,#E9F7F0,#D6EFE3);color:var(--teal-d)}
.ib-red{background:linear-gradient(150deg,#FCEDEA,#F8DDD8);color:var(--red)}

/* segmented */
.seg{display:flex; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:4px; gap:4px}
.seg button{flex:1; border:0; background:none; font-family:var(--sans); font-weight:800; font-size:13.5px; color:var(--muted); padding:11px 8px; border-radius:999px; cursor:pointer; transition:all var(--dur) var(--ease); letter-spacing:-.01em}
.seg button.on{background:var(--paper); color:var(--indigo-d); box-shadow:0 2px 8px rgba(26,29,45,.10), 0 1px 2px rgba(26,29,45,.06)}

/* tiles */
.tiles{display:grid; grid-template-columns:1fr 1fr; gap:11px}
.tile{position:relative; border:1.5px solid var(--line); background:var(--paper); border-radius:18px; padding:14px; cursor:pointer; text-align:left; font-family:var(--sans); box-shadow:var(--sh-1); transition:all var(--dur) var(--ease)}
.tile:hover{border-color:var(--line2); box-shadow:var(--sh-2); transform:translateY(-1px)}
.tile:active{transform:scale(.98)}
.tile.on{border-color:var(--indigo); background:#F7F9FF; box-shadow:0 0 0 3.5px rgba(44,60,142,.10)}
.tile .ic-box{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.tile .ic-box svg{width:21px;height:21px}
.tile .t-title{font-weight:700; font-size:14px; letter-spacing:-.01em}
.tile .t-sub{font-size:11.5px; color:var(--faint); font-weight:500; margin-top:2px; line-height:1.3}
.tile .t-check{position:absolute; top:11px; right:11px; width:21px;height:21px;border-radius:50%; background:var(--indigo); color:#fff; display:none; align-items:center; justify-content:center; animation:pop .3s var(--spring)}
.tile .t-check svg{width:13px;height:13px}
.tile.on .t-check{display:flex}

/* trust strip */
.trust{display:flex; align-items:stretch; gap:0; background:var(--paper); border:1px solid var(--line); border-radius:18px; padding:13px 6px; box-shadow:var(--sh-1)}
.trust .t{flex:1; text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; padding:0 6px}
.trust .t + .t{border-left:1px solid var(--line)}
.trust .t svg{width:20px;height:20px;color:var(--teal)}
.trust .t span{font-size:10.5px; font-weight:700; color:var(--muted); line-height:1.3}
.trust .t .vline{display:none}

/* journey card (From -> To) */
.journey{padding:17px 17px 7px}
.j-line{display:flex; gap:13px}
.j-rail{flex:none; width:18px; display:flex; flex-direction:column; align-items:center; padding-top:7px}
.j-dot{width:12px;height:12px;border-radius:50%;border:3px solid var(--indigo);background:#fff;box-shadow:0 0 0 3.5px rgba(44,60,142,.10)}
.j-dot.dest{border-color:var(--saffron); background:var(--saffron); box-shadow:0 0 0 3.5px rgba(232,130,31,.14)}
.j-track{flex:1; width:2px; background:repeating-linear-gradient(180deg, var(--line2) 0 4px, transparent 4px 9px); background-size:2px 9px; margin:4px 0; animation:flow 1.6s linear infinite}
.j-fields{flex:1}
.j-input{padding:8px 0}
.j-input .jk{font-size:10.5px; font-weight:800; color:var(--faint); text-transform:uppercase; letter-spacing:.12em}
.j-input input{border:0;outline:0;background:transparent;font-family:var(--sans);font-weight:700;font-size:16px;color:var(--ink);width:100%;padding:2px 0}
.j-hr{height:1px;background:var(--line);margin:2px 0}
.j-swap{position:absolute; right:18px; top:50%; transform:translateY(-50%); width:38px;height:38px;border-radius:50%;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh-2);transition:transform .34s var(--spring)}
.j-swap:hover{transform:translateY(-50%) rotate(180deg)}
.j-swap:active{transform:translateY(-50%) rotate(180deg) scale(.9)}
.j-swap svg{width:17px;height:17px;color:var(--indigo)}

/* ---------- overlays: toast / sheet ---------- */
#toast{position:absolute; left:50%; bottom:96px; transform:translateX(-50%) translateY(16px) scale(.96); z-index:90; background:rgba(21,25,44,.94); backdrop-filter:blur(10px); color:#fff; font-size:13.5px; font-weight:600; padding:12px 18px; border-radius:999px; box-shadow:0 14px 34px -8px rgba(14,17,32,.5); opacity:0; pointer-events:none; transition:opacity .3s, transform .34s var(--spring); max-width:86%; text-align:center; display:flex; gap:9px; align-items:center}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0) scale(1)}
#toast svg{width:17px;height:17px;flex:none;color:#9DB8FF}

#scrim{position:absolute; inset:0; background:rgba(13,16,30,.5); backdrop-filter:blur(2.5px); z-index:70; opacity:0; pointer-events:none; transition:opacity .32s}
#scrim.show{opacity:1; pointer-events:auto}
#sheet{position:absolute; left:0; right:0; bottom:0; z-index:75; background:var(--paper); border-radius:30px 30px 0 0; box-shadow:var(--sh-3); transform:translateY(102%); visibility:hidden; transition:transform .44s var(--spring), visibility 0s linear .44s; max-height:86%; overflow-y:auto}
#sheet.show{transform:translateY(0); visibility:visible; transition:transform .44s var(--spring)}
#sheet .sheet-grip{width:42px;height:5px;border-radius:3px;background:var(--line2);margin:12px auto 4px}
#sheet .sheet-pad{padding:8px 20px 28px}

/* ---------- spinner / skeleton / processing ---------- */
.spinner{width:24px;height:24px;border-radius:50%;border:3px solid var(--indigo-100);border-top-color:var(--indigo);animation:spin .8s linear infinite}
.spinner.lg{width:46px;height:46px;border-width:4px}
.sk{background:linear-gradient(100deg, var(--surface) 32%, #FDFCF9 46%, var(--surface) 60%); background-size:220% 100%; animation:shimmer 1.5s ease-in-out infinite; border-radius:12px}
@keyframes shimmer{from{background-position:130% 0} to{background-position:-90% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
@keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes flow{to{background-position:0 9px}}
@keyframes wheelspin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(232,130,31,.5)}70%{box-shadow:0 0 0 9px rgba(232,130,31,0)}}
@keyframes radar{from{transform:scale(.5);opacity:.5}to{transform:scale(2.05);opacity:0}}
.spin-slow{animation:wheelspin 9s linear infinite}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--saffron);animation:glow 1.8s ease-out infinite}
@keyframes glowI{0%,100%{box-shadow:0 0 0 0 rgba(44,60,142,.45)}70%{box-shadow:0 0 0 11px rgba(44,60,142,0)}}
.pulse-ind{animation:glowI 1.8s ease-out infinite}
.pulse-saf{animation:glow 2s ease-out infinite}
.center-col{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;min-height:62vh;padding:24px}

/* ---------- brand ---------- */
.brandmark{display:inline-flex; align-items:center; gap:9px}
.brandmark .wheel{width:34px;height:34px}
.brandmark .word{font-family:var(--serif); font-weight:600; font-size:25px; letter-spacing:-.01em; color:var(--indigo-d)}
.wheel-lg{width:74px;height:74px}
.wheel-sm{width:22px;height:22px}

/* OTP boxes */
.otp{display:flex; gap:12px; justify-content:center; margin:8px 0 4px}
.otp .box{width:58px;height:66px;border:1.6px solid transparent;border-radius:17px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:29px;font-weight:600;color:var(--indigo-d);background:var(--surface); transition:all var(--dur) var(--ease)}
.otp .box.fill{border-color:var(--indigo); background:var(--paper); box-shadow:var(--sh-1); animation:pop .28s var(--spring)}
.otp .box.active{border-color:var(--indigo-l); background:var(--paper); box-shadow:0 0 0 4px rgba(90,110,194,.15)}

/* ---------- screen transition ---------- */
.screen-in{animation:screenIn .46s var(--ease) both}
@keyframes screenIn{from{opacity:0; transform:translateY(12px) scale(.995)} to{opacity:1; transform:translateY(0) scale(1)}}
.stagger > *{opacity:0; animation:rise .55s var(--ease) forwards}
#screen-inner.no-anim .stagger>*{opacity:1;animation:none}
#screen-inner.no-anim .screen-in{animation:none}
@keyframes rise{from{opacity:0;transform:translateY(13px)} to{opacity:1;transform:translateY(0)}}

/* ---------- demo control ---------- */
#demoFab{position:absolute; right:0; top:50%; transform:translateY(-50%); z-index:97; background:#141826; color:#fff; border:0; border-radius:14px 0 0 14px; padding:13px 6px 13px 9px; cursor:pointer; box-shadow:-6px 6px 20px rgba(14,17,32,.3); opacity:.88; display:flex; flex-direction:column; align-items:center; gap:7px; transition:opacity .25s, padding-right .2s}
#demoFab:hover{opacity:1; padding-right:12px}
#demoFab svg{width:15px;height:15px}
#demoFab .lbl{writing-mode:vertical-rl; transform:rotate(180deg); font-family:var(--sans); font-weight:800; font-size:10px; letter-spacing:.18em}
#demoPanel{position:absolute; right:14px; top:50%; transform:translateY(-50%); z-index:96; width:284px; max-width:calc(100% - 28px); background:var(--paper); border:1px solid var(--line); border-radius:22px; box-shadow:var(--sh-3); padding:16px; display:none; max-height:82%; overflow-y:auto}
#demoPanel.show{display:block; animation:rise .3s var(--ease)}
#demoPanel h4{margin:0 0 3px; font-size:14px; font-weight:800}
#demoPanel p{margin:0 0 12px; font-size:11.5px; color:var(--faint); line-height:1.4}
.dctl{margin-bottom:11px}
.dctl .dk{font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:5px}
.dseg{display:flex; gap:5px}
.dseg button{flex:1; border:1px solid var(--line); background:var(--surface); font-family:var(--sans); font-size:11.5px; font-weight:700; color:var(--muted); padding:7px 4px; border-radius:10px; cursor:pointer; transition:all .2s}
.dseg button.on{background:var(--indigo); color:#fff; border-color:var(--indigo)}
#demoPanel .djump{font-size:11.5px; color:var(--indigo); font-weight:700; cursor:pointer; padding:7px 0; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center}
#demoPanel .djump:hover{color:var(--indigo-d)}
#demoPanel .djump svg{width:17px;height:17px;flex:none}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.04s !important}
}

function icon(name,cls){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" class="'+('ic '+(cls||'')).trim()+'">'+(I[name]||'')+'</svg>'; }

/* ---- el helpers ---- */
const $ = s=>document.querySelector(s);
const vp=$('#viewport'), inner=$('#screen-inner'), appbar=$('#appbar'), navbar=$('#navbar');

/* ---- navigation / router ---- */
function go(screen, opts){
  opts=opts||{};
  if(!opts.replace && S.screen && S.screen!==screen){ S.history.push(S.screen); }
  if(opts.reset){ S.history=[]; }
  S.screen=screen;
  $('#screen').scrollTop=0;
  render();
}
function back(){
  if(S.history.length){ S.screen=S.history.pop(); render(); }
}
function setNav(tab){ S.nav=tab; }

/* ---- render ---- */
const SCREENS={};
function render(){
  const def=SCREENS[S.screen]; if(!def) return;
  if(S._carousel){ clearInterval(S._carousel); S._carousel=null; }
  if($('#sheet').classList.contains('show')){ $('#sheet').classList.remove('show'); $('#scrim').classList.remove('show'); }
  // app bar
  if(def.appbar){
    const a=def.appbar();
    appbar.className=a.flush?'flush':'';
    const bk = a.back===false ? ''
      : a.backHome ? '<button class="ab-back" data-act="gohome" aria-label="Home">'+icon('back')+'</button>'
      : '<button class="ab-back" data-act="back" aria-label="Back">'+icon('back')+'</button>';
    appbar.innerHTML = bk +
      '<div><div class="ab-title">'+(a.title||'')+'</div>'+(a.sub?'<div class="ab-sub">'+a.sub+'</div>':'')+'</div>'+
      (a.right?'<div class="ab-right">'+a.right+'</div>':'');
  }
  vp.parentElement; // noop
  document.getElementById('viewport').classList.toggle('has-appbar', !!def.appbar);
  document.getElementById('viewport').classList.toggle('has-nav', !!def.nav);
  document.getElementById('device').classList.toggle('dark-status', !!def.dark);
  document.getElementById('screen').style.paddingTop = def.bleed ? '0px' : '';
  // nav
  if(def.nav){ navbar.innerHTML=navHTML(); }
  // body — only play the entry animation on real navigation, not same-screen re-renders (no flicker)
  const animate = (S._lastRendered !== S.screen);
  S._lastRendered = S.screen;
  inner.className = animate ? '' : 'no-anim';
  inner.innerHTML = (animate ? '<div class="screen-in">' : '<div>') + def.body() + '</div>';
  if(def.after) def.after();
  // draft dock — "pick up where you left off", shown only on home, above the nav bar
  const dockEl=document.getElementById('dock');
  if(dockEl){
    const d=(S.screen==='home') ? draftInfo() : null;
    dockEl.innerHTML = d ? draftDockHTML(d) : '';
    dockEl.classList.toggle('show', !!d);
    document.getElementById('viewport').classList.toggle('has-dock', !!d);
  }
  refreshDemoPanel();
}

/* ---- draft dock helpers ---- */
function draftInfo(){
  const o=S.order;

SCREENS.otp={
  appbar(){ return {title:'Verify your number', sub:'Code sent to +91 '+fmtPhone(S.user.phone)}; },
  body(){
    return '<div class="wrap" style="padding-top:10px">'+
      '<p class="lede" style="margin:0 0 4px">Enter the 4-digit code we just sent you.</p>'+

      '<div style="margin-top:18px">'+
        '<button id="verifyBtn" class="btn btn-primary btn-lg btn-block" disabled data-act="verifyOtp">Verify</button>'+

      '</div>'+
    '</div>';
  },
  after(){
    S._otp='';
    const status=$('#otp-status');
    // auto-fill after delay (simulated SMS autofill)
    S._otpTimer=setTimeout(()=>{
      if(S.screen!=='otp') return;
      const code='1234'; let i=0;
      status.textContent='Detecting code…';
      const step=setInterval(()=>{
        if(S.screen!=='otp'){ clearInterval(step); return; }
        const b=$('#ob'+i); if(b){ b.textContent=code[i]; b.classList.add('fill'); }
        i++;
        if(i>=4){ clearInterval(step); S._otp=code; $('#verifyBtn').disabled=false; status.textContent='Code detected — verifying…';
          setTimeout(()=>{ if(S.screen==='otp') doVerify(); }, 900); }
      },180);
    }, TIMING.otpAutofill);
  }
};
function needAuth(){ return !S.user.verified; }
function gateAuth(after){ S._afterAuth=after||null; return go('login'); }
function doVerify(){

  if(uc==='send') Object.assign(base,{ mode:'flight', drop:'Bengaluru \u00b7 meet the traveller', category:'food', item:'Homemade besan laddoos', weight:'2 kg', size:'Medium box \u00b7 up to 40\u00d730\u00d720 cm', packaging:'sealed', photo:true, value:'\u20b9800', receiverName:'Ravi Kumar', receiverPhone:'+91 98220 14455', fragile:false, docCount:'12 pages', docType:'Certificates', envelope:'A4 sealed' });
  if(uc==='companion') Object.assign(base,{ companionFor:'My mother', paxName:'Sunita Devi', companionAge:'68', paxGender:'female', paxLangs:['Hindi','Kannada'], assistance:['Wheelchair to gate','Help through security'], womenOnly:true, receiverMode:'receiver', receiverName:'Arjun Sharma', receiverPhone:'+91 98••• •••12', flightNo:'6E-185', collect:'DEL T3 \u00b7 check-in assistance', drop:'BLR T1 \u00b7 hand to receiver', _depTime:'06:10', _whenDateLabel:null });
  if(uc==='bringback') Object.assign(base,{ item:'Mysore Pak', brand:'Sri Krishna Sweets', qty:'2 boxes (500 g each)', shop:'Sri Krishna Sweets, T. Nagar', shopLoc:'Sri Krishna Sweets \u00b7 T. Nagar, Chennai', city:'Chennai', budget:'\u20b9800', whoBuys:'traveller', substitutes:true, substituteNote:'Adyar Ananda Bhavan is fine too', weight:'1 kg', collect:'Chennai \u00b7 traveller buys', drop:'BLR T1 \u00b7 Arrivals' });
  return base;
}
function priceFor(o, t){
  // deterministic, transparent pricing (₹) with per-person delta
  let base=40, dist=320, handling=0, itemCost=0;
  if(o.useCase==='send'){
    const m = t ? t.mode : (o.mode||'flight');
    if(m==='train'){ base=30; dist=220; } else { base=40; dist=320; }
    if(o.category==='electronics'){ handling+=40; }
    if(o.fragile) handling+=20;
    if(o.category==='documents'){ dist = (m==='train'?200:300); }
  }
  if(o.useCase==='companion'){ base=200; dist=1000; handling=0; }
  if(o.useCase==='bringback'){ base=40; dist=260; itemCost=800; }
  const delta = t? ({rohan:0,asha:30,imran:-20,kavya:-15,meera:0,lakshmi:40}[t.id]||0) : 0;
  dist+=delta;
  const fee=Math.round((base+dist+handling)*0.15);
  const total=base+dist+handling+itemCost;
  const earns=base+dist+handling-fee;
  return {base,dist,handling,itemCost,fee,total,earns};
}
function modeDefaults(m){
  if(m==='train') return { collect:'New Delhi Rly Stn \u00b7 platform 5', drop:'KSR Bengaluru \u00b7 platform 1', when:'On the train you book together' };
  return { collect:'Karol Bagh, New Delhi', drop:'BLR T1 \u00b7 Arrivals meet-point', when:'Before 5:00 PM \u00b7 '+S.route.date };
}
function matchPool(){
  const o=S.order;
  if(o&&o.useCase==='companion') return COMPANIONS.slice();
  let pool=TRAVELLERS.slice();
  return pool;
}
function rankedMatches(){
  const o=S.order; let pool=matchPool();
  if(o.useCase==='companion'&&o.womenOnly) pool=pool.filter(p=>p.women);
  return pool.map(t=>({t,p:priceFor(o,t)})).sort((a,b)=>a.p.total-b.p.total);
}

function formSend(o){

    field('What is it?','pkg',o.item,'o-item')+

function openWhenPicker(){
  const o=S.order; if(!o) return;
  const pad=n=>String(n).padStart(2,'0');
  const now=new Date();
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayIso=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  const dval = o._whenDate || todayIso;
  if(o.useCase==='companion'){
    openSheet('<div class="h2" style="font-size:18px;margin-bottom:4px">When do they travel?</div>'+
      '<div class="tiny faint" style="margin-bottom:14px">Pick the travel date \u2014 the flight below is when '+paxLabel(o)+' flies.</div>'+
      '<div class="field"><label>Travel date</label><div class="control">'+icon('cal')+'<input type="date" id="wp-date" value="'+dval+'" style="border:0;background:none;flex:1;font:inherit;color:var(--ink)"></div></div>'+
      '<div class="card card-pad" style="background:var(--surface);box-shadow:none;display:flex;align-items:center;gap:11px;margin-bottom:6px"><div class="ic-box ib-indigo" style="width:38px;height:38px;border-radius:11px;flex:none">'+icon('plane')+'</div><div style="flex:1"><div style="font-weight:700;font-size:14px">'+esc(o.flightNo||'Flight')+'</div><div class="tiny faint">departs '+esc(o._depTime||'06:10')+' \u00b7 assistance on this flight</div></div></div>'+
      '<button class="btn btn-primary btn-block" id="wp-set" style="margin-top:8px">Set travel date</button>');
    const set=$('#wp-set');
    if(set) set.addEventListener('click',()=>{
      let d=$('#wp-date').value; if(!d) d=todayIso;
      o._whenDate=d;
      const dt=new Date(d+'T12:00');
      if(!isNaN(dt)){ const lab=days[dt.getDay()]+', '+dt.getDate()+' '+months[dt.getMonth()]; o._whenDateLabel=lab; o.date=lab; }
      closeSheet(); render();
    });
    return;
  }
  const tval = o._whenTime || '17:00';
  openSheet('<div class="h2" style="font-size:18px;margin-bottom:4px">When should it happen?</div>'+
    '<div class="tiny faint" style="margin-bottom:14px">Pick the date and time for pickup and handover.</div>'+
    '<div class="field"><label>Date</label><div class="control">'+icon('cal')+'<input type="date" id="wp-date" value="'+dval+'" style="border:0;background:none;flex:1;font:inherit;color:var(--ink)"></div></div>'+
    '<div class="field"><label>Time</label><div class="control">'+icon('clock')+'<input type="time" id="wp-time" value="'+tval+'" style="border:0;background:none;flex:1;font:inherit;color:var(--ink)"></div></div>'+
    '<button class="btn btn-primary btn-block" id="wp-set" style="margin-top:8px">Set date & time</button>');
  const set=$('#wp-set');
  if(set) set.addEventListener('click',()=>{
    let d=$('#wp-date').value; const tm=$('#wp-time').value||'17:00';
    if(!d) d=todayIso;
    o._whenDate=d; o._whenTime=tm;
    const dt=new Date(d+'T'+tm);
    if(!isNaN(dt)){ let hh=dt.getHours(); const ap=hh>=12?'PM':'AM'; let h12=hh%12; if(h12===0)h12=12; o.when=dt.getDate()+' '+months[dt.getMonth()]+' \u00b7 '+h12+':'+pad(dt.getMinutes())+' '+ap; }
    closeSheet(); render();
  });
}

/* ============================================================

function cityCode(name, mode){
  const n=(name||'').toLowerCase();
  const hub=HUBS.find(h=>n.includes(h[0].toLowerCase()));
  if(!hub) return (name||'???').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase()||'???';
  if(mode==='train'){ const m=hub[3].match(/\(([^)]+)\)/); return m?m[1]:hub[1]; }
  return hub[1];
}
function cityShort(name){ return esc((name||'').split('(')[0].trim()); }
function ticketBarcode(seed){
  let bars='', x=6;
  const s=String(seed||'SA-2000');
  for(let i=0;i<26;i++){
    const c=s.charCodeAt(i%s.length)+i*7;
    const wd=1+(c%3)*0.9, gap=1.6+((c>>2)%3);
    bars+='<rect x="'+x.toFixed(1)+'" y="0" width="'+wd.toFixed(1)+'" height="30" rx="0.5"/>';
    x+=wd+gap;
  }
  return '<svg viewBox="0 0 '+Math.ceil(x+6)+' 30" style="display:block;height:30px;margin:0 auto;max-width:100%" fill="var(--ink)" opacity=".85">'+bars+'</svg>';
}
function ticketRosette(sz){
  sz=sz||20;
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" style="flex:none"><circle cx="12" cy="12" r="9.2"/><circle cx="12" cy="12" r="2.6"/><path d="M12 2.8v6M12 15.2v6M2.8 12h6M15.2 12h6M5.5 5.5l4.2 4.2M14.3 14.3l4.2 4.2M18.5 5.5l-4.2 4.2M9.7 14.3l-4.2 4.2"/></svg>';
}

function trackLabels(o){
  if(o&&o.useCase==='companion'){

SCREENS.req_track={

          '<div style="padding:3px 0 '+(i<TRACK_STEPS.length-1?'14px':'0')+'"><div style="font-weight:700;font-size:14px;color:'+(cur?'var(--indigo-d)':done?'var(--ink)':'var(--faint)')+'">'+lbl[0]+(cur?' \u00b7 now':'')+'</div>'+(cur?'<div class="tiny faint" style="margin-top:1px">'+esc(t.name.split(' ')[0])+lbl[1]+'</div>':'')+'</div></div>';
        }).join('')+

      // coordinate row

        '<div style="width:44px;height:44px;border-radius:50%;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:18px;flex:none">'+t.initial+'</div>'+

      '</div>'+

function trackCTA(idx, noShow){

  return '<button class="btn btn-teal btn-lg btn-block" data-act="openConfirm">'+icon('check')+(comp?' Confirm '+px+' arrived safely':' I\u2019ve received it \u2014 confirm handover')+'</button>';
}

function newIncoming(){
  const t=S.trip; if(!t) return null;
  if(!t._served) t._served={send:0, companion:0};
  const offersComp = !!(t.offers && t.offers.includes('companion'));
  const offersParcel = !t.offers || t.offers.includes('parcels');
  const avail=ty=> ((ty==='companion'&&offersComp)||(ty==='send'&&offersParcel)) && t._served[ty]<REQ_POOL[ty].length;
  let type=null;
  if(offersComp && offersParcel){ type = ((t._served.send+t._served.companion)%2===0)?'send':'companion'; if(!avail(type)) type=(type==='send'?'companion':'send'); }
  else type = offersComp?'companion':'send';
  if(!avail(type)) return null;
  const base=REQ_POOL[type][t._served[type]]; t._served[type]++;
  const r=Object.assign({}, base);
  r.when = (type==='companion' ? 'At check-in \u00b7 ' : 'Before 5:00 PM \u00b7 ')+(t.date||S.route.date);
  if(type==='companion') r.flightNo = t.flight||'6E-185';
  return r;
}

    const ctx=S._kycCtx||'pay';

      '<div class="card card-pad" style="margin-top:16px;animation-delay:.1s"><div style="display:flex;gap:11px;align-items:flex-start"><span style="color:var(--teal-d);margin-top:1px">'+icon(ctx==='golive'?'spark':ctx==='profile'?'user':'lock')+'</span><div><div style="font-weight:700;font-size:14.5px">'+line+'</div><div class="tiny muted" style="margin-top:2px">'+(ctx==='golive'?'Travellers on your route will start seeing it once published.':ctx==='profile'?'You can now send and earn with the verified badge.':'Saarthi holds your money safely and releases it only when you confirm handover.')+'</div></div></div></div>'+

  }
};
function verifyLoader(title, sub, ic){
  return '<div class="center-col"><div style="position:relative;width:104px;height:104px;display:flex;align-items:center;justify-content:center"><div style="position:absolute;inset:0;border-radius:50%;border:2px solid var(--indigo-l);animation:radar 1.9s var(--ease) infinite"></div><div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(160deg,#3A4CAE,var(--indigo-d));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-2)">'+icon(ic||'shield','ic-hero')+'</div></div><div style="font-weight:700;font-size:16px">'+title+'</div><div class="tiny faint" style="max-width:250px;text-align:center;line-height:1.5">'+sub+'</div></div>';
}
function doKyc(method){

  inner.className=''; inner.innerHTML=verifyLoader('Verifying your identity\u2026', copy, 'shield');
  document.getElementById('viewport').className='';
  setTimeout(()=>{ S.user.kycDone=true; S.user.verified=true; go('kyc_done',{replace:true}); }, 2400);
}
function doKycDocs(){

/* ---- 4. PUBLISH (loading) ---- */
SCREENS.trav_posting={
  appbar(){ return {title:'', back:false}; },
  body(){ const t=S.trip; return verifyLoader('Publishing your trip', 'Verifying PNR with '+(t.mode==='flight'?'IndiGo':'the railway')+' and matching you to requests on '+esc(t.from)+' \u2192 '+esc(t.to)+'\u2026', t.mode==='flight'?'plane':'train'); },
  after(){ setTimeout(()=>{ if(S.screen==='trav_posting'){ S.trip.reqState='waiting'; go('trav_live',{replace:true}); } }, 1600); }
};

/* ---- 5. LIVE / AVAILABLE (request arrives ~4s; can expire) ---- */
SCREENS.trav_live={
  nav:true,
  appbar(){ return {title:'Your trip is live', sub:(S.trip&&S.trip.tid?'Trip '+S.trip.tid:''), backHome:true}; },
  body(){
    const t=S.trip;
    return '<div class="wrap" style="padding-top:6px">'+
      // the trip pass — ticket-styled hero
      travTripTicket(t)+
      // earnings strip
      '<div class="card card-pad" style="margin-top:12px;display:flex;align-items:center;gap:12px"><div class="ic-box ib-teal" style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none">'+icon('wallet')+'</div><div style="flex:1"><div class="tiny faint">Earned on this trip</div><div style="font-weight:800;font-size:18px;color:var(--teal-d)">'+rupee(S.travEarnings)+'</div></div><button class="btn btn-link" data-act="openWallet" style="font-size:13px">Payouts</button></div>'+

      // request area
      '<div id="reqArea" style="margin-top:14px">'+ liveReqArea() +'</div>'+
    '</div>';
  },
  after(){
    clearTravTimers();
    if(S.trip.reqState==='waiting' && (S.trip.jobs||[]).length<TRIP_CAP){
      S._travReqTimer=setTimeout(()=>{ if(S.screen!=='trav_live')return; if((S.trip.jobs||[]).length>=TRIP_CAP) return; const inc=newIncoming(); if(!inc){ return; } S.trip.reqState='incoming'; S.trip._inc=inc; render(); notify('New request from '+esc(inc.reqName), esc(inc.item)+' \u00b7 you earn '+rupee(inc.earns)+'.','bell','ib-saffron');
        if(S.demo.request==='expire'){ S._travExpireTimer=setTimeout(()=>{ if(S.screen==='trav_live'&&S.trip.reqState==='incoming'){ S.trip.reqState='expired'; render(); notify('Request expired','You didn\u2019t respond in time \u2014 it went to another traveller.','clock','ib-red'); } }, 6000); }
      }, TIMING.requestArrive);
    }
  }
};
function travTripTicket(t){
  const booked=(t.jobs||[]).length;
  const inner=
    tkHeader((t.tid||''),'Saarthi Trip')+
    '<div style="padding:12px 16px 13px">'+
      tkRoute(t.from,t.to,t.mode,t.date)+
      '<div style="display:flex;align-items:center;gap:10px;margin-top:12px">'+
        '<div class="ic-box ib-indigo" style="width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center">'+icon(t.mode==='flight'?'plane':'train')+'</div>'+
        '<div style="flex:1;min-width:0"><div style="font-weight:800;font-size:14px">'+esc(t.flight)+'</div><div class="tiny faint" style="margin-top:1px">dep '+esc(t.dep||'')+' \u00b7 arr '+esc(t.arr||'')+' \u00b7 '+booked+' of '+TRIP_CAP+' handovers booked</div></div>'+
        '<span class="pill pill-teal" style="flex:none"><span style="width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;animation:pulse 1.4s infinite"></span>Live</span>'+
      '</div>'+
      '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:12px">'+t.accepts.map(c=>'<span class="pill pill-ghost">'+c+'</span>').join('')+'<span class="pill pill-ghost">Up to '+esc(t.maxWeight)+'</span></div>'+
    '</div>';
  return '<div class="tkt"><div class="tkt-card">'+inner+'</div></div>';
}
function jobNextUp(t){
  const jobs=(t&&t.jobs)||[];
  return jobs.find(j=>j.status==='handover') || jobs.find(j=>j.status==='collect') || jobs.find(j=>j.status==='arrived') || null;
}
function jobStatusPill(j){
  if(j.status==='done') return '<span class="pill pill-teal" style="flex:none">'+icon('check')+'Handed over</span>';
  if(j.status==='handover') return '<span class="pill pill-saffron" style="flex:none">At handover</span>';
  if(j.status==='arrived') return '<span class="pill pill-indigo" style="flex:none"><span class="dot-live" style="width:6px;height:6px;background:var(--indigo)"></span>On board</span>';
  return '<span class="pill pill-ghost" style="flex:none">To collect</span>';
}
function tripJobCard(j){
  const comp=(j.uc==='companion');
  const nx=jobNextUp(S.trip); const isNext=(nx&&nx.jid===j.jid&&j.status!=='done');
  const num=parseInt(String(j.jid).replace(/\D/g,''),10)||1;
  const cta = j.status==='done' ? 'Receipt' : j.status==='handover' ? 'Enter code' : j.status==='arrived' ? 'Continue' : (comp?'Meet '+(j.paxName||'').split(' ')[0]:'Collect');
  return '<button class="card" data-act="openTripJob" data-jid="'+esc(j.jid)+'" style="width:100%;text-align:left;cursor:pointer;padding:13px 14px;border:1px solid '+(isNext?'var(--saffron)':'var(--line)')+(j.status==='done'?';background:var(--teal-50);border-color:#CBEBDD':'')+'">'+
    '<div style="display:flex;align-items:center;gap:11px">'+
      '<div class="ic-box '+(comp?'ib-saffron':'ib-indigo')+'" style="width:40px;height:40px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center">'+icon(comp?'users':'pkg')+'</div>'+
      '<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(comp?('Accompany '+(j.paxName||'')):j.item)+'</span>'+(isNext?'<span class="pill" style="flex:none;padding:2px 7px;font-size:9.5px;background:linear-gradient(180deg,#F09330,var(--saffron));color:#fff">Next up</span>':'')+'</div>'+
      '<div class="tiny faint" style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Handover '+num+' of '+TRIP_CAP+' \u00b7 for '+esc(j.reqName)+' \u00b7 to '+(comp?jobRecv(j):jobRecvSend(j))+'</div></div>'+
      jobStatusPill(j)+
    '</div>'+
    '<hr class="sep" style="margin:11px 0"/>'+
    '<div style="display:flex;align-items:center;gap:8px"><span class="pill pill-ghost" style="padding:5px 9px;font-size:11px">'+icon('qr')+'Code '+(j.status==='done'?esc(j.code):'\u2022\u2022'+esc(String(j.code).slice(2)))+'</span><span class="tiny" style="margin-left:auto;font-weight:800;color:var(--teal-d)">'+(j.status==='done'?'+'+rupee(j.earns)+' paid':rupee(j.earns)+' on handover')+'</span><span class="tiny" style="flex:none;font-weight:800;color:var(--indigo);display:inline-flex;align-items:center;gap:3px">'+cta+' '+icon('chev')+'</span></div>'+
  '</button>';
}
function liveReqArea(){
  const t=S.trip;
  const jobs=(t.jobs||[]); const activeJ=jobs.filter(j=>j.status!=='done');
  if(jobs.length>=TRIP_CAP){
    if(activeJ.length===0){
      const total=jobs.reduce((s,j)=>s+(j.earns||0),0);
      return '<div class="card card-pad" style="text-align:center;background:var(--teal-50);border-color:#CBEBDD">'+
        '<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(160deg,#149C70,var(--teal-d));color:#fff;display:flex;align-items:center;justify-content:center;margin:2px auto 0">'+icon('check','ic-hero')+'</div>'+
        '<div class="h2" style="margin-top:10px;font-size:18px;color:var(--teal-d)">Trip complete</div>'+
        '<p class="lede" style="margin:5px 0 0;font-size:13.5px">Both handovers done \u2014 <b style="color:var(--teal-d)">'+rupee(total)+'</b> earned on this trip.</p>'+
        '<button class="btn btn-teal btn-block btn-lg" style="margin-top:14px" data-act="travEndTrip">End trip \u00b7 save to history</button>'+
        '<button class="btn btn-link btn-block" style="margin-top:2px" data-act="gohome">Back to home</button></div>';

    return '<div class="card card-pad" style="display:flex;gap:12px;align-items:flex-start;background:var(--surface);box-shadow:none">'+
      '<div class="ic-box ib-indigo" style="width:42px;height:42px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center">'+icon('lock')+'</div>'+
      '<div style="flex:1"><div style="font-weight:800;font-size:14px">Trip full \u00b7 '+TRIP_CAP+' of '+TRIP_CAP+' handovers booked</div>'+
      '<div class="tiny faint" style="margin-top:3px;line-height:1.5">That\u2019s the cap for one journey \u2014 it keeps every handover calm and safe. Finish these and you\u2019re done.</div></div></div>';
  }
  if(t.reqState==='waiting'){
    return '<div class="card card-pad" style="text-align:center;border-style:dashed">'+
      '<div style="position:relative;width:92px;height:92px;margin:4px auto 0;display:flex;align-items:center;justify-content:center">'+
        '<div style="position:absolute;inset:0;border-radius:50%;border:2px solid var(--indigo-l);animation:radar 2s var(--ease) infinite"></div>'+
        '<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(150deg,#F0F3FE,#E2E8FA);color:var(--indigo);display:flex;align-items:center;justify-content:center">'+icon('bell','ic-hero')+'</div>'+
      '</div>'+
      '<div style="font-weight:700;font-size:14.5px;margin-top:12px">Listening for requests\u2026</div>'+
      '<div class="tiny faint" style="margin-top:3px;margin-bottom:14px">We\u2019ll alert you when someone on your route needs a hand.</div>'+
      '<div style="display:flex;gap:12px;align-items:center;text-align:left;background:var(--surface);border-radius:16px;padding:12px 13px">'+
        '<div class="sk" style="width:42px;height:42px;border-radius:50%;flex:none"></div>'+
        '<div style="flex:1"><div class="sk" style="height:11px;width:52%"></div><div class="sk" style="height:9px;width:76%;margin-top:7px"></div></div>'+
        '<div class="sk" style="width:48px;height:15px;flex:none"></div>'+
      '</div></div>';
  }
  if(t.reqState==='incoming'){
    const r=t._inc;
    return '<div class="card pulse-saf" style="border-color:var(--saffron);overflow:hidden">'+
      '<div style="background:linear-gradient(120deg,#FDF1E1,#FBE6C8);padding:10px 16px;display:flex;align-items:center;gap:8px"><span class="pill" style="background:linear-gradient(180deg,#F09330,var(--saffron));color:#fff;box-shadow:var(--sh-1)">'+icon('bell')+'New request</span>'+(S.demo.request==='expire'?'<span class="tiny" style="margin-left:auto;color:var(--saffron-d);font-weight:800">expiring soon\u2026</span>':'<span class="tiny" style="margin-left:auto;color:var(--saffron-d);font-weight:800">on your route</span>')+'</div>'+
      '<button class="row" data-act="travReview" style="border:0;box-shadow:none;align-items:flex-start;padding:15px 16px;background:none"><div style="position:relative;flex:none"><div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(160deg,#3A4CAE,var(--indigo-d));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:20px">'+r.reqInitial+'</div><span style="position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2.5px var(--paper)"><span style="display:flex;width:10px;height:10px">'+icon('check')+'</span></span></div>'+
        '<div class="r-body"><div style="display:flex;align-items:center;gap:6px"><span class="r-title">'+esc(r.reqName)+'</span><span class="tiny" style="display:flex;align-items:center;gap:3px;color:var(--muted)">'+iconFill('star')+r.reqRating+'</span></div>'+
        '<div class="r-sub" style="margin-top:3px">'+esc(r.item)+(r.weight?' \u00b7 '+esc(r.weight):'')+'</div>'+
        '<div class="r-sub" style="margin-top:2px;display:flex;align-items:center;gap:5px">'+icon('pin')+esc(r.collect)+'</div></div>'+
        '<div style="text-align:right;flex:none"><div class="tiny faint">you earn</div><div style="font-family:var(--serif);font-weight:600;font-size:21px;color:var(--teal-d);letter-spacing:-.01em">'+rupee(r.earns)+'</div></div></button>'+
      '<div style="padding:0 16px 15px"><button class="btn btn-accent btn-block" data-act="travReview">Review request '+icon('arrow')+'</button></div>'+
    '</div>';
  }
  // expired
  return '<div class="card card-pad" style="text-align:center;background:var(--surface)">'+
    '<div style="width:54px;height:54px;border-radius:50%;background:var(--red-50);color:var(--red);display:flex;align-items:center;justify-content:center;margin:0 auto">'+icon('clock','ic-hero')+'</div>'+
    '<div class="h2" style="margin-top:10px;font-size:18px">Request expired</div>'+
    '<p class="lede" style="margin:6px 0 0">You didn\u2019t respond in time, so Priya was matched with another traveller. Stay available \u2014 more requests come through all day.</p>'+

}

          : '<div style="display:flex;gap:12px;align-items:center"><div style="width:54px;height:54px;border-radius:12px;background:var(--indigo-50);display:flex;align-items:center;justify-content:center;color:var(--indigo);flex:none">'+icon('camera')+'</div><div style="flex:1"><div style="font-weight:700;font-size:14.5px">'+esc(r.item)+'</div><div class="tiny faint" style="margin-top:2px">'+esc(r.category)+' \u00b7 '+esc(r.weight)+' \u00b7 declared value '+esc(r.value)+'</div></div><span class="pill pill-indigo" style="padding:6px 9px">'+icon('eye')+'Photo</span></div>')+

/* ===== Stage 3 — fast, SLA-bound payout (Roadie instant-cashout model) ===== */
function upiId(){ const n=(S.user&&S.user.name||'you').toLowerCase().replace(/[^a-z]/g,'')||'you'; return n+'@okaxis'; }
function payoutTimeline(step){
  // step (phase): 0 = processing now, 1 = crediting now, 2 = all done
  const rows=[
    ['Released','Payment released the moment you handed over'],
    ['Processing','Sent to '+upiId()],
    ['Credited', step>=2 ? ('In your account \u00b7 '+(S._poTime||clockNow())) : 'Usually instant \u2014 within 30 min']
  ];
  const rowState=(i)=> i<=step ? 'done' : (i===step+1 && step<2 ? 'cur' : 'pending');
  return rows.map((r,i)=>{
    const st=rowState(i);
    const circle = st==='done'
      ? '<div style="width:26px;height:26px;border-radius:50%;background:var(--teal);border:2px solid var(--teal);color:#fff;display:flex;align-items:center;justify-content:center">'+icon('check')+'</div>'
      : st==='cur'
        ? '<div style="width:26px;height:26px;border-radius:50%;background:var(--paper);border:2px solid var(--indigo);display:flex;align-items:center;justify-content:center"><span class="spinner" style="width:13px;height:13px;border-width:2px"></span></div>'
        : '<div style="width:26px;height:26px;border-radius:50%;background:var(--surface);border:2px solid var(--line2)"></div>';
    const conn = i<rows.length-1 ? '<div style="width:2px;height:24px;background:'+(st==='done'?'var(--teal)':'var(--line)')+'"></div>' : '';
    const col = st==='cur'?'var(--indigo-d)':st==='done'?'var(--ink)':'var(--faint)';
    return '<div style="display:flex;gap:12px;align-items:flex-start"><div style="display:flex;flex-direction:column;align-items:center">'+circle+conn+'</div>'+
      '<div style="padding-bottom:'+(i<rows.length-1?'10px':'0')+'"><div style="font-weight:700;font-size:14px;color:'+col+'">'+r[0]+(st==='cur'?' \u00b7 now':'')+'</div><div class="tiny faint" style="margin-top:1px">'+r[1]+'</div></div></div>';
  }).join('');
}

const CASE_TYPES=[
  ['damaged','Item damaged','It arrived broken or damaged','alert'],
  ['lost','Item lost','It never arrived','x'],
  ['notdesc','Not as described','It isn\u2019t what was agreed','info'],
  ['noshow','Traveller no-show','They didn\u2019t turn up','clock'],
  ['other','Something else','A different problem','help']
];
function caseTypeLabel(ty){ const c=CASE_TYPES.find(x=>x[0]===ty); return c?c[1]:'Issue'; }
function newCaseId(){ return 'SAA-'+(3700+Math.floor(Math.random()*200)); }
function caseTimeline(c){
  const idx={open:0,review:1,resolved:2}[c.status];
  const rows=[
    ['Open','Opened '+(c.opened||'today')+' \u00b7 '+(c.time||'')],
    ['Under review','A specialist replies within 4 hours'],
    ['Resolved', c.status==='resolved' ? (c.resolution==='refunded'?('Refunded '+rupee(c.amount)+' to you'):'Sorted \u2014 payment released') : 'Most cases resolved within 48 hours']
  ];
  return rows.map((r,i)=>{
    const done=i<idx, cur=i===idx; const isCheck=done||(cur&&c.status==='resolved'); const isSpin=cur&&c.status!=='resolved';
    const circle = isCheck
      ? '<div style="width:26px;height:26px;border-radius:50%;background:var(--teal);border:2px solid var(--teal);color:#fff;display:flex;align-items:center;justify-content:center">'+icon('check')+'</div>'
      : isSpin
        ? '<div style="width:26px;height:26px;border-radius:50%;background:var(--paper);border:2px solid var(--indigo);display:flex;align-items:center;justify-content:center"><span class="spinner" style="width:13px;height:13px;border-width:2px"></span></div>'
        : '<div style="width:26px;height:26px;border-radius:50%;background:var(--surface);border:2px solid var(--line2)"></div>';
    const conn = i<rows.length-1 ? '<div style="width:2px;height:24px;background:'+(done?'var(--teal)':'var(--line)')+'"></div>' : '';
    const col = cur?'var(--indigo-d)':isCheck?'var(--ink)':'var(--faint)';
    return '<div style="display:flex;gap:12px;align-items:flex-start"><div style="display:flex;flex-direction:column;align-items:center">'+circle+conn+'</div>'+
      '<div style="padding-bottom:'+(i<rows.length-1?'10px':'0')+'"><div style="font-weight:700;font-size:14px;color:'+col+'">'+r[0]+(isSpin?' \u00b7 now':'')+'</div><div class="tiny faint" style="margin-top:1px">'+r[1]+'</div></div></div>';
  }).join('');
}

function fmtSel(s){ const dt=new Date(s.y,s.m,s.d); return DOW3[dt.getDay()]+', '+s.d+' '+MON[s.m]; }

  const c=S._cal; const first=new Date(c.y,c.m,1).getDay(); const days=new Date(c.y,c.m+1,0).getDate();

  for(let d=1;d<=days;d++){ const v=tval(c.y,c.m,d); const past=v<TODAYV; const seld=(S.route.sel.y===c.y&&S.route.sel.m===c.m&&S.route.sel.d===d); const today=(v===TODAYV);

function hubResults(q){
  q=(q||'').trim().toLowerCase();
  const list = q ? HUBS.filter(h=>(h[0]+' '+h[1]+' '+h[3]).toLowerCase().includes(q)) : HUBS.slice(0,5);
  const rows=[];
  list.forEach(h=>{ rows.push({val:h[0]+' ('+h[1]+')',kind:'air',sub:h[2]+' \u00b7 Airport'}); rows.push({val:h[3],kind:'rail',sub:h[0]+' \u00b7 Railway station'}); });

}

  if(act==='flowToWhere'){ return flowNext('req_where'); }
  if(act==='flowToReview'){ return flowNext('req_review'); }
  if(act==='editWhat'){ S._editReturn='req_review'; return go('req_form'); }
  if(act==='editWhere'){ S._editReturn='req_review'; return go('req_where'); }
  if(act==='editRecv'){ S._editReturn='req_review'; return go('req_where'); }
  if(act==='editWhen'){ return openWhenPicker(); }
  if(act==='editRoute'){
    const o=S.order; if(!o) return;
    openSheet('<div class="h2" style="font-size:18px;margin-bottom:4px">Edit route & date</div>'+
      '<div class="tiny faint" style="margin-bottom:13px">Change where this journey starts, ends, or the travel date.</div>'+
      '<div style="display:flex;flex-direction:column;gap:9px">'+
        '<button class="row" data-act="openRoute" data-obj="order" data-target="from"><div class="ic-box ib-indigo" style="width:38px;height:38px;border-radius:11px">'+icon('pin')+'</div><div class="r-body"><div class="tiny faint">From</div><div class="r-title" style="font-size:14px">'+esc(o.from)+'</div></div><div class="r-trail">'+icon('chev')+'</div></button>'+
        '<button class="row" data-act="openRoute" data-obj="order" data-target="to"><div class="ic-box ib-saffron" style="width:38px;height:38px;border-radius:11px">'+icon('nav')+'</div><div class="r-body"><div class="tiny faint">To</div><div class="r-title" style="font-size:14px">'+esc(o.to)+'</div></div><div class="r-trail">'+icon('chev')+'</div></button>'+
        '<button class="row" data-act="orderDate"><div class="ic-box ib-teal" style="width:38px;height:38px;border-radius:11px">'+icon('cal')+'</div><div class="r-body"><div class="tiny faint">Travel date</div><div class="r-title" style="font-size:14px">'+esc(o.date)+'</div></div><div class="r-trail">'+icon('chev')+'</div></button>'+
      '</div>');
    return;
  }
  if(act==='orderDate'){ S._dateFor='order'; S._cal={y:S.route.sel.y,m:S.route.sel.m}; return openDateSheet(); }
  if(act==='draftResume'){ const d=draftInfo(); if(!d) return; S._editReturn=null; return go(d.step); }
  if(act==='draftDiscard'){ S.order=null; S._editReturn=null; toast('Draft discarded','trash'); return render(); }
  if(act==='addMedia'){ if(t.dataset.kind==='photo') S.order.photo=true; toast((t.dataset.kind==='photo'?'Photo':'Video')+' added', 'check'); return render(); }
  if(act==='setCompFor'){ const v=t.dataset.v; S.order.companionFor=v; const lv=v.toLowerCase(); if(lv.includes('mother')){ S.order.paxGender='female'; } else if(lv.includes('father')){ S.order.paxGender='male'; S.order.womenOnly=false; } return render(); }
  if(act==='setPaxGender'){ S.order.paxGender=t.dataset.g; if(t.dataset.g!=='female') S.order.womenOnly=false; return render(); }
  if(act==='toggleLang'){ const l=t.dataset.l; if(!S.order.paxLangs) S.order.paxLangs=[]; const i=S.order.paxLangs.indexOf(l); if(i>=0)S.order.paxLangs.splice(i,1); else S.order.paxLangs.push(l); return render(); }
  if(act==='receiverPicker'){ return openReceiverPicker(); }
  if(act==='shopMap'){ return openShopMap(); }
  if(act==='toggleAssist'){ const a=t.dataset.a; const i=S.order.assistance.indexOf(a); if(i>=0)S.order.assistance.splice(i,1); else S.order.assistance.push(a); return render(); }
  if(act==='toggleWomen'){ S.order.womenOnly=!S.order.womenOnly; return render(); }

  /* ---- matches / profile ---- */
  if(act==='breakdown'){ return showBreakdown(t.dataset.id); }
  if(act==='closeSheet'){ return closeSheet(); }
  if(act==='pickMatch'){ const m=matchPool().find(x=>x.id===t.dataset.id); S.order.match=m; if(m && S.order.useCase==='send'){ S.order.mode=m.mode; const d=modeDefaults(m.mode); S.order.drop=d.drop; S.order.when=(m.mode==='train'?m.line+' \u00b7 dep '+m.dep:'Flight '+m.line+' \u00b7 dep '+m.dep); } return openTravSheet(m); }
  if(act==='chooseMatch'){ closeSheet(); return go('req_checkout'); }
  if(act==='fullProfile'){ closeSheet(); return go('req_profile'); }
  if(act==='toCheckout'){ return go('req_checkout'); }
  if(act==='payMethod'){ S.order._pm=t.dataset.id; return render(); }

  /* ---- payment ---- */
  if(act==='payNow'){ if(!S.user.kycDone){ S._kycCtx='pay'; S._kycThen='req_processing'; return go('kyc'); } return go('req_processing'); }
  if(act==='retryPay'){ S._retryForce='success'; return go('req_processing',{replace:true}); }

  /* ---- success / track ---- */
  if(act==='openTrack'){ if(!S.order.status) S.order.status='accepted'; return go('req_track',{replace:true}); }
  if(act==='actOpen'){
    const id=t.dataset.id;
    if(id==='live_o'){ if(S.order&&S.order.status==='delivered'){ S._actSel={role:'req',title:ucTitle(S.order.useCase),from:S.order.from,to:S.order.to,date:S.order.date,earned:S.order.price.total}; return go('activity_receipt'); } return go('req_track'); }
    if(id.indexOf('job_')===0){ const jb=(S.trip&&S.trip.jobs||[]).find(x=>'job_'+x.jid===id); if(jb){ S.job=jb;
      if(jb.status==='done'){ S._actSel={role:'trav', uc:jb.uc, title:(jb.uc==='companion'?'Accompanied '+esc((jb.paxName||'them').split(' ')[0]):'Carried for '+esc(jb.reqName.split(' ')[0])), from:S.trip.from, to:S.trip.to, date:S.trip.date, earned:jb.earns}; return go('activity_receipt'); }
      return go('trav_job'); } }
    if(id==='live_j'){ if(S.job&&S.job.status==='done'){ S._actSel={role:'trav',title:'Carrying for '+S.job.reqName.split(' ')[0],from:S.trip&&S.trip.from,to:S.trip&&S.trip.to,date:S.trip&&S.trip.date,earned:S.job.earns}; return go('activity_receipt'); } return go('trav_job'); }
    if(id==='live_t'){ return go('trav_live'); }
    const a=S.activity.find(x=>x.id===id); if(!a) return;
    if(a.state==='done'){ S._actSel=a; return go('activity_receipt'); }
    if(a.role==='req'){ S.order=hydrateSeedOrder(a); return go('req_track'); }
    S.trip=hydrateSeedTrip(a); S.job=null; return go('trav_live');
  }
  if(act==='cancelReq'){
    return openSheet('<div class="h2" style="font-size:18px">Cancel this request?</div>'+
      '<p class="lede" style="margin:8px 0 16px">'+esc(S.order.match.name.split(' ')[0])+' hasn\u2019t completed the handover, so you\u2019ll get a <b>full refund of '+rupee(S.order.price.total)+'</b>.</p>'+
      '<button class="btn btn-danger btn-block btn-lg" data-act="confirmCancel">Yes, cancel & refund</button>'+
      '<button class="btn btn-ghost btn-block" style="margin-top:9px" data-act="closeSheet">Keep my request</button>');
  }
  if(act==='confirmCancel'){ closeSheet(); clearTimeout(S._trackTimer); S.order._refundReason='cancel'; notify('Full refund initiated \u00b7 '+rupee(S.order.price.total),'Cancelled before handover \u2014 every rupee heads back to you.','rupee','ib-teal'); return go('req_refund',{replace:true}); }
  if(act==='reportNoShow'){ clearTimeout(S._trackTimer); S.order._refundReason='noshow'; notify('No-show reported \u00b7 full refund initiated',rupee(S.order.price.total)+' is on its way back \u2014 sorry about this one.','rupee','ib-teal'); return go('req_refund',{replace:true}); }
  if(act==='openConfirm'){ clearTimeout(S._trackTimer); return go('req_confirm'); }

  /* ---- confirm / release ---- */
  if(act==='releaseEscrow'){ if(S.order&&S.order._held){ toast('Payment is on hold while your case is open','lock'); return; } if($('#confirmBtn')&&$('#confirmBtn').disabled) return; S.order.status='delivered'; S.order._deliveredAt=clockNow();
    const _o=S.order,_nm=esc(_o.match.name.split(' ')[0]);
    notify(rupee(_o.price.total)+' released to '+_nm,'Handover confirmed \u2014 the money left escrow instantly.','check','ib-teal');
    notify((_o.useCase==='companion'?'Arrived safely \u00b7 ticket '+orderOid(_o)+' stamped':'Delivered \u00b7 ticket '+orderOid(_o)+' stamped'),(_o.useCase==='companion'?paxLabel(_o)+' is now with '+receiverLabel(_o)+'.':'Your '+ucVerb(_o.useCase)+' reached '+esc(_o.to)+'.'),'check','ib-indigo');
    return go('req_rating',{replace:true}); }
  if(act==='findAnother'){ S.order.status=null; S.order.match=null; S.order._refundReason=null; return go('req_matching',{reset:true}); }

  /* ---- rating ---- */
  if(act==='setStar'){ S.order.rating=+t.dataset.n; render(); return; }
  if(act==='toggleTag'){ t.classList.toggle('pill-ghost'); t.classList.toggle('pill-indigo'); return; }
  if(act==='setTip'){ S.order.tip=+t.dataset.v; return render(); }
  if(act==='finishRating'){ if(!S.order.rating){ toast('Tap the stars to rate'); return; } return go('req_done',{replace:true}); }
  if(act==='anotherReq'){ S.order=newOrder(); S._editReturn=null; return go('req_form',{reset:true}); }
});

/* ============================================================
   helpers
   ============================================================ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtPhone(p){ p=(p||'').padEnd(10,'•'); return p.slice(0,5)+' '+p.slice(5); }
function ucLabel(uc){ return ({send:'send-a-parcel',companion:'companion',baggage:'rail-baggage',bringback:'bring-back'})[uc]||''; }
function openSelect(key){
  const o=S.order; if(!o) return;
  const sets={
    packaging:{title:'Packaging',opts:[['To be prepared','prepared'],['Sealed & prepared','sealed']],cur:o.packaging,set:v=>o.packaging=v},
    docType:{title:'Document type',opts:[['Certificates','Certificates'],['Legal documents','Legal documents'],['Bank papers','Bank papers'],['Personal letters','Personal letters']],cur:o.docType,set:v=>o.docType=v},
    fragile:{title:'Handling',opts:[['Standard',false],['Fragile · handle with care',true]],cur:o.fragile,set:v=>o.fragile=v},
    size:{title:'Container / size',opts:[
      ['Envelope — documents, up to A4','Envelope · up to A4'],
      ['Small box — up to 25×20×10 cm','Small box · up to 25×20×10 cm'],
      ['Medium box — up to 40×30×20 cm','Medium box · up to 40×30×20 cm'],
      ['Cabin bag — up to 55×35×25 cm','Cabin bag · up to 55×35×25 cm'],
      ['Check-in bag — up to 158 cm (L+W+H)','Check-in bag · up to 158 cm'],
      ['Large / oversized — 158 cm+ (rail or road)','Oversized · 158 cm+ (rail/road)'],
    ],cur:o.size,set:v=>o.size=v},
    insCover:{title:'Coverage amount',opts:INS_TIERS.map(t=>[rupee(t.cover)+'  \u00b7  '+rupee(t.premium)+' one-time',t.cover]),cur:insCover(o),set:v=>o.insCover=+v},
    whoBuys:{title:'Who pays for the item',opts:[['Traveller buys — I reimburse on handover','traveller'],['I\u2019ll prepay the item now','prepay']],cur:o.whoBuys,set:v=>o.whoBuys=v}
  };
  const s=sets[key]; if(!s) return;
  openSheet('<div class="h2" style="font-size:18px;margin-bottom:12px">'+s.title+'</div>'+
    '<div style="display:flex;flex-direction:column;gap:9px">'+
    s.opts.map((o2,i)=>'<button class="row" data-selopt="'+key+'" data-i="'+i+'"><div class="r-body"><div class="r-title" style="font-size:14.5px">'+o2[0]+'</div></div><div class="r-trail">'+((String(s.cur)===String(o2[1]))?'<span class="pill pill-indigo">'+icon('check')+'</span>':'')+'</div></button>').join('')+
    '</div>');
  $('#sheet').querySelectorAll('[data-selopt]').forEach(btn=>btn.addEventListener('click',()=>{ s.set(s.opts[+btn.dataset.i][1]); closeSheet(); render(); }));
}
function openTicketCat(){
  const opts=['A delivery','Payment or refund','Safety concern','My account','Something else'];
  openSheet('<div class="h2" style="font-size:18px;margin-bottom:12px">What\u2019s it about?</div><div style="display:flex;flex-direction:column;gap:9px">'+
    opts.map((o,i)=>'<button class="row" data-tkopt="'+i+'"><div class="r-body"><div class="r-title" style="font-size:14.5px">'+o+'</div></div><div class="r-trail">'+((S._ticket&&S._ticket.cat===o)?'<span class="pill pill-indigo">'+icon('check')+'</span>':'')+'</div></button>').join('')+'</div>');
  $('#sheet').querySelectorAll('[data-tkopt]').forEach(btn=>btn.addEventListener('click',()=>{ S._ticket.cat=opts[+btn.dataset.tkopt]; closeSheet(); render(); }));
}
function wheelSVG(color,cls){
  return '<svg viewBox="0 0 64 64" class="'+(cls||'')+'" fill="none" stroke="'+color+'" stroke-width="3" stroke-linecap="round">'+
    '<circle cx="32" cy="32" r="22"/><circle cx="32" cy="32" r="5.5" fill="'+color+'" stroke="none"/>'+
    '<path d="M32 10v8M32 46v8M10 32h8M46 32h8M16.5 16.5l5.6 5.6M41.9 41.9l5.6 5.6M47.5 16.5l-5.6 5.6M22.1 41.9l-5.6 5.6"/></svg>';
}

/* ============================================================
   demo control panel
   ============================================================ */
const demoFab=$('#demoFab'), demoPanel=$('#demoPanel');
demoFab.addEventListener('click',()=>{ demoPanel.classList.toggle('show'); refreshDemoPanel(); });
function refreshDemoPanel(){
  if(!demoPanel.classList.contains('show')) return;
  demoPanel.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px"><h4 style="margin:0">Demo controls</h4><button data-dclose aria-label="Close" style="width:30px;height:30px;border:1px solid var(--line);background:var(--surface);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)">'+icon('x')+'</button></div>'+
    '<p>Pre-set how the live steps behave, so you can show any path.</p>'+
    dseg('Payment','payment',[['success','Success'],['fail','Fail']])+
    dseg('Incoming request','request',[['arrive','Arrives'],['expire','Expires']])+
    dseg('Delivery','delivery',[['success','Success'],['noshow','No-show']])+
    '<div class="djump" data-act="nav" data-nav="home">Jump · Home '+icon('chev')+'</div>'+
    '<div class="djump" data-jump="welcome">Jump · Welcome screen '+icon('chev')+'</div>'+
    '<div class="djump" data-jump="reset">Restart demo (clear session) '+icon('chev')+'</div>';
}
demoPanel.addEventListener('click',e=>{
  if(e.target.closest('[data-dclose]')){ demoPanel.classList.remove('show'); return; }
  const seg=e.target.closest('[data-dkey]');
  if(seg){ S.demo[seg.dataset.dkey]=seg.dataset.dval; refreshDemoPanel(); toast('Demo: '+seg.dataset.dkey+' → '+seg.dataset.dval); return; }
  const j=e.target.closest('[data-jump]');
  if(j){ const v=j.dataset.jump; demoPanel.classList.remove('show');
    if(v==='reset'){ location.reload(); return; }
    go(v,{reset:true}); return; }
  const nav=e.target.closest('[data-act="nav"]');
  if(nav){ demoPanel.classList.remove('show'); S.nav=nav.dataset.nav; go(nav.dataset.nav,{reset:true}); }
});
function dseg(label,key,opts){
  return '<div class="dctl"><div class="dk">'+label+'</div><div class="dseg">'+
    opts.map(([v,l])=>'<button class="'+(S.demo[key]===v?'on':'')+'" data-dkey="'+key+'" data-dval="'+v+'">'+l+'</button>').join('')+'</div></div>';
}

/* ---- live clock in status bar ---- */
function tickClock(){ const d=new Date(); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0'); $('#sb-time').textContent=h+':'+m; }
tickClock(); setInterval(tickClock,15000);

/* ---- boot ---- */
render();
</script>
